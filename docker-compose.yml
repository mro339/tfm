
name: federated-learning

services:
  server:
    build: ./server
    container_name: fl-server
    ports:
      - "8080:8080"
    networks:
      - flnet
    environment:
      - TOTAL_CLIENTS=3 
    volumes:
      - ./results:/app/results
    cap_add:
      - NET_ADMIN

  client1:
    build: ./client
    container_name: fl-client1
    environment:
      - CLIENT_ID=1
      - TOTAL_CLIENTS=3
      - NET_LATENCY=10ms
      - NET_LOSS=0%
      - NET_BANDWIDTH=1gbit
      - CPU_LIMIT=4.0
      - PERFIL=Servidor
    depends_on:
      - server
    networks:
      - flnet
    volumes:
      - ./results:/app/results
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: '4.0'

  client2:
    build: ./client
    container_name: fl-client2
    environment:
      - CLIENT_ID=2
      - TOTAL_CLIENTS=3
      - NET_LATENCY=100ms
      - NET_LOSS=1%
      - NET_BANDWIDTH=10mbit
      - CPU_LIMIT=1.0
      - PERFIL=Movil
    depends_on:
      - server
    networks:
      - flnet
    volumes:
      - ./results:/app/results
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: '1.0'

  client3:
    build: ./client
    container_name: fl-client3
    environment:
      - CLIENT_ID=3
      - TOTAL_CLIENTS=3
      - NET_LATENCY=20ms
      - NET_LOSS=0%
      - NET_BANDWIDTH=100mbit
      - CPU_LIMIT=2.0
      - PERFIL=WiFi
    depends_on:
      - server
    networks:
      - flnet
    volumes:
      - ./results:/app/results
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: '2.0'

networks:
  flnet:
    driver: bridge
