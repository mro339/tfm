
name: federated-learning

services:
  server:
    build: ./server
    container_name: fl-server
    ports:
      - "8080:8080"
    networks:
      - flnet
    environment:
      - TOTAL_CLIENTS=4 
    volumes:
      - ./results:/app/results
    cap_add:
      - NET_ADMIN

  client1:
    build: ./client
    container_name: fl-client1
    environment:
      - CLIENT_ID=1
      - TOTAL_CLIENTS=4
      - NET_LATENCY=200ms
      - NET_LOSS=5%
      - NET_BANDWIDTH=1mbit
      - CPU_LIMIT=0.5
      - PERFIL=IoT
      - START_DELAY=0
    depends_on:
      - server
    networks:
      - flnet
    volumes:
      - ./results:/app/results
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: '0.5'

  client2:
    build: ./client
    container_name: fl-client2
    environment:
      - CLIENT_ID=2
      - TOTAL_CLIENTS=4
      - NET_LATENCY=100ms
      - NET_LOSS=1%
      - NET_BANDWIDTH=10mbit
      - CPU_LIMIT=1.0
      - PERFIL=Movil
      - START_DELAY=60
    depends_on:
      - server
    networks:
      - flnet
    volumes:
      - ./results:/app/results
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: '1.0'

  client3:
    build: ./client
    container_name: fl-client3
    environment:
      - CLIENT_ID=3
      - TOTAL_CLIENTS=4
      - NET_LATENCY=100ms
      - NET_LOSS=1%
      - NET_BANDWIDTH=10mbit
      - CPU_LIMIT=1.0
      - PERFIL=Movil
      - START_DELAY=0
    depends_on:
      - server
    networks:
      - flnet
    volumes:
      - ./results:/app/results
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: '1.0'

  client4:
    build: ./client
    container_name: fl-client4
    environment:
      - CLIENT_ID=4
      - TOTAL_CLIENTS=4
      - NET_LATENCY=100ms
      - NET_LOSS=1%
      - NET_BANDWIDTH=10mbit
      - CPU_LIMIT=1.0
      - PERFIL=Movil
      - START_DELAY=0
    depends_on:
      - server
    networks:
      - flnet
    volumes:
      - ./results:/app/results
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: '1.0'

  pumba:
    image: gaiaadm/pumba
    container_name: chaos-monkey
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --random --interval 2m kill --signal SIGTERM "re2:^fl-client"
    depends_on:
      - server

networks:
  flnet:
    driver: bridge
